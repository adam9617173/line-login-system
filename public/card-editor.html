<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE 名片編輯器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    
    .header { background: linear-gradient(135deg, #06C755, #00B337); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.5rem; }
    
    .container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    
    .editor { flex: 1; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .preview { width: 400px; background: #e5e5e5; border-radius: 12px; padding: 20px; position: sticky; top: 20px; }
    
    .section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .section h3 { margin-bottom: 15px; color: #333; }
    
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #06C755; color: white; }
    .btn-secondary { background: #667eea; color: white; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 5px; color: #666; font-size: 0.85rem; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: #06C755; }
    
    .item-card { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
    .item-card .remove-btn { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
    
    .preview-title { text-align: center; margin-bottom: 15px; color: #333; }
    
    .line-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .line-card-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; }
    .line-card-header .motto { font-size: 0.85rem; opacity: 0.9; }
    
    .line-card-hero { text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); }
    .line-card-hero img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; object-fit: cover; }
    .line-card-hero .name { font-size: 1.3rem; font-weight: bold; color: #1a1a2e; margin-top: 10px; }
    .line-card-hero .title { font-size: 0.9rem; color: #667eea; margin-top: 5px; }
    
    .line-card-body { padding: 15px; }
    .line-card-body .info-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .line-card-body .info-label { color: #999; font-size: 0.8rem; width: 60px; }
    .line-card-body .info-value { color: #333; font-size: 0.9rem; }
    
    .line-card-buttons { padding: 10px 15px; }
    .line-card-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; text-align: center; border-radius: 8px; text-decoration: none; font-size: 0.9rem; }
    .line-card-btn-primary { background: linear-gradient(135deg, #06C755, #00B337); color: white; }
    
    .add-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .add-btn { padding: 8px 12px; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .add-btn:hover { background: #e0e0e0; }
    
    .json-output { margin-top: 20px; }
    .json-output textarea { width: 100%; height: 150px; font-family: monospace; font-size: 0.8rem; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    
    /* 登入狀態 */
    .status-bar { padding: 10px 20px; text-align: center; }
    .status-logged-in { background: #e8f5e9; color: #2e7d32; }
    .status-logged-out { background: #fff3e0; color: #e65100; }
    .status-error { background: #ffebee; color: #c62828; }
    
    /* 載入畫面 */
    .loading-screen { text-align: center; padding: 60px 20px; }
    .loading-screen h2 { color: #333; margin-bottom: 15px; }
    .loading-screen p { color: #666; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📇 LINE 名片編輯器</h1>
  </div>
  
  <!-- 狀態列 -->
  <div id="statusBar" class="status-bar">初始化中...</div>
  
  <div class="container">
    <!-- 載入/登入畫面 -->
    <div class="loading-screen" id="loadingScreen">
      <h2>⏳ 正在初始化...</h2>
      <p>請稍候</p>
    </div>
    
    <!-- 編輯器 -->
    <div class="editor" id="editorPanel" style="display: none;">
      <div class="section">
        <h3>👤 基本資料</h3>
        <div class="form-group">
          <label>大頭照網址</label>
          <input type="text" id="avatarUrl" placeholder="https://..." oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="displayName" placeholder="你的名字" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>職稱</label>
          <input type="text" id="title" placeholder="工程師" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>公司</label>
          <input type="text" id="company" placeholder="公司名稱" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>座右銘</label>
          <input type="text" id="motto" placeholder="一句話介紹自己" oninput="updatePreview()">
        </div>
      </div>
      
      <div class="section">
        <h3>📞 聯絡資訊</h3>
        <div id="contactFields"></div>
        <div class="add-buttons">
          <button class="add-btn" onclick="addContact('phone')">+ 電話</button>
          <button class="add-btn" onclick="addContact('email')">+ Email</button>
          <button class="add-btn" onclick="addContact('line')">+ LINE</button>
          <button class="add-btn" onclick="addContact('website')">+ 網站</button>
        </div>
      </div>
      
      <div class="section">
        <h3>🔘 按鈕</h3>
        <div id="buttonFields"></div>
        <button class="btn btn-primary" onclick="addButton()">+ 新增按鈕</button>
      </div>
      
      <div class="json-output">
        <h3>📄 Flex Message JSON</h3>
        <textarea id="jsonOutput" readonly></textarea>
        <div style="margin-top: 10px; display: flex; gap: 10px;">
          <button class="btn btn-secondary" onclick="copyJson()">📋 複製</button>
          <button class="btn btn-primary" onclick="shareToLine()">📱 分享給 LINE 好友</button>
        </div>
      </div>
    </div>
    
    <!-- 預覽 -->
    <div class="preview" id="previewPanel" style="display: none;">
      <h3 class="preview-title">👁️ 預覽</h3>
      <div id="cardPreview"></div>
    </div>
  </div>

  <!-- LIFF SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@line/liff@2/dist/liff.min.js"></script>
  
  <script>
    // ========== 設定 ==========
    const LIFF_ID = '2008927075-RmILZFtb';
    let currentUserId = null;
    let currentProfile = null;
    
    // ========== LIFF 初始化流程 ==========
    window.onload = async function() {
      const statusBar = document.getElementById('statusBar');
      const loadingScreen = document.getElementById('loadingScreen');
      const editorPanel = document.getElementById('editorPanel');
      const previewPanel = document.getElementById('previewPanel');
      
      try {
        // 1. 初始化 LIFF
        statusBar.textContent = '🔄 正在初始化 LINE SDK...';
        statusBar.className = 'status-bar';
        
        await liff.init({ liffId: LIFF_ID });
        console.log('✅ LIFF 初始化成功');
        
        // 2. 檢查是否在 LINE 內
        if (!liff.isInClient()) {
          statusBar.innerHTML = '⚠️ 建議在 LINE 內開啟以使用完整功能';
          statusBar.className = 'status-bar status-logged-out';
        }
        
        // 3. 檢查登入狀態
        if (liff.isLoggedIn()) {
          statusBar.textContent = '✅ 已登入，正在取得用戶資料...';
          
          // 4. 取得用戶資料
          currentProfile = await liff.getProfile();
          currentUserId = currentProfile.userId;
          
          statusBar.innerHTML = `✅ 歡迎，${currentProfile.displayName || '用戶'}！`;
          statusBar.className = 'status-bar status-logged-in';
          
          // 5. 顯示編輯器
          loadingScreen.style.display = 'none';
          editorPanel.style.display = 'block';
          previewPanel.style.display = 'block';
          
          // 6. 載入已儲存的名片
          await loadSavedCard();
          
          // 7. 初始化預覽
          updatePreview();
          
        } else {
          // 未登入，執行登入
          statusBar.textContent = '🔐 請先登入 LINE...';
          statusBar.className = 'status-bar status-logged-out';
          
          loadingScreen.innerHTML = `
            <h2>🔐 需要登入</h2>
            <p>請使用 LINE 帳號登入</p>
            <button class="btn btn-primary" onclick="doLogin()" style="font-size: 1.1rem; padding: 12px 30px;">LINE 登入</button>
          `;
        }
        
      } catch (error) {
        console.error('❌ LIFF 初始化失敗:', error);
        statusBar.textContent = '❌ 初始化失敗: ' + error.message;
        statusBar.className = 'status-bar status-error';
        
        loadingScreen.innerHTML = `
          <h2>❌ 無法初始化</h2>
          <p>錯誤：${error.message}</p>
          <p style="font-size: 0.85rem; color: #999;">請確認：<br>1. LIFF ID 是否正確<br>2. 網址是否在 LINE 內開啟</p>
        `;
      }
    };
    
    // 執行登入
    function doLogin() {
      liff.login();
    }
    
    // ========== 名片編輯功能 ==========
    let cardData = {
      avatarUrl: '',
      displayName: '',
      title: '',
      company: '',
      motto: '',
      contacts: [],
      buttons: []
    };
    
    function addContact(type) {
      const labels = { phone: '電話', email: 'Email', line: 'LINE', website: '網站' };
      const id = Date.now();
      cardData.contacts.push({ id, type, label: labels[type], value: '' });
      renderContactFields();
      updatePreview();
    }
    
    function removeContact(id) {
      cardData.contacts = cardData.contacts.filter(c => c.id !== id);
      renderContactFields();
      updatePreview();
    }
    
    function renderContactFields() {
      const container = document.getElementById('contactFields');
      container.innerHTML = cardData.contacts.map(c => `
        <div class="item-card">
          <button class="remove-btn" onclick="removeContact(${c.id})">✕</button>
          <div class="form-group">
            <label>${c.label}</label>
            <input type="text" placeholder="請輸入" value="${c.value}" oninput="updateContact(${c.id}, this.value)">
          </div>
        </div>
      `).join('');
    }
    
    function updateContact(id, value) {
      const contact = cardData.contacts.find(c => c.id === id);
      if (contact) contact.value = value;
      updatePreview();
    }
    
    function addButton() {
      const id = Date.now();
      cardData.buttons.push({ id, label: '按鈕文字', url: 'https://' });
      renderButtonFields();
      updatePreview();
    }
    
    function removeButton(id) {
      cardData.buttons = cardData.buttons.filter(b => b.id !== id);
      renderButtonFields();
      updatePreview();
    }
    
    function renderButtonFields() {
      const container = document.getElementById('buttonFields');
      container.innerHTML = cardData.buttons.map(b => `
        <div class="item-card">
          <button class="remove-btn" onclick="removeButton(${b.id})">✕</button>
          <div class="form-group">
            <label>按鈕文字</label>
            <input type="text" value="${b.label}" oninput="updateButton(${b.id}, 'label', this.value)">
          </div>
          <div class="form-group">
            <label>連結網址</label>
            <input type="text" value="${b.url}" oninput="updateButton(${b.id}, 'url', this.value)">
          </div>
        </div>
      `).join('');
    }
    
    function updateButton(id, field, value) {
      const button = cardData.buttons.find(b => b.id === id);
      if (button) button[field] = value;
      updatePreview();
    }
    
    // ========== 預覽與 JSON ==========
    function updatePreview() {
      cardData.avatarUrl = document.getElementById('avatarUrl').value;
      cardData.displayName = document.getElementById('displayName').value;
      cardData.title = document.getElementById('title').value;
      cardData.company = document.getElementById('company').value;
      cardData.motto = document.getElementById('motto').value;
      
      const preview = document.getElementById('cardPreview');
      const avatarHtml = cardData.avatarUrl 
        ? `<img src="${cardData.avatarUrl}" alt="avatar">` 
        : `<div style="width:100px;height:100px;background:#ddd;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;">👤</div>`;
      
      preview.innerHTML = `
        <div class="line-card">
          ${cardData.motto ? `<div class="line-card-header"><div class="motto">${cardData.motto}</div></div>` : ''}
          <div class="line-card-hero">
            ${avatarHtml}
            <div class="name">${cardData.displayName || '姓名'}</div>
            ${cardData.title ? `<div class="title">${cardData.title}</div>` : ''}
          </div>
          ${cardData.contacts.filter(c => c.value).length > 0 ? `
            <div class="line-card-body">
              ${cardData.contacts.filter(c => c.value).map(c => `
                <div class="info-row">
                  <span class="info-label">${c.label}</span>
                  <span class="info-value">${c.value}</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
          ${cardData.buttons.filter(b => b.label && b.url).length > 0 ? `
            <div class="line-card-buttons">
              ${cardData.buttons.filter(b => b.label && b.url).map(b => `
                <a href="${b.url}" class="line-card-btn line-card-btn-primary">${b.label}</a>
              `).join('')}
            </div>
          ` : ''}
        </div>
      `;
      
      generateJSON();
    }
    
    function generateJSON() {
      const flex = {
        type: "bubble",
        header: cardData.motto ? {
          type: "box", layout: "vertical",
          contents: [{ type: "text", text: cardData.motto, color: "#ffffff", weight: "bold" }],
          backgroundColor: "#667eea", paddingAll: "xl"
        } : null,
        hero: {
          type: "box", layout: "vertical",
          contents: [
            cardData.avatarUrl ? { type: "image", url: cardData.avatarUrl, size: "full", aspectMode: "cover", aspectRatio: "320:213" } : null,
            {
              type: "box", layout: "vertical",
              contents: [
                { type: "text", text: cardData.displayName || "姓名", weight: "bold", size: "xl", align: "center" },
                cardData.title ? { type: "text", text: cardData.title, color: "#667eea", size: "sm", align: "center" } : null
              ].filter(Boolean),
              paddingAll: "md"
            }
          ].filter(Boolean)
        },
        body: {
          type: "box", layout: "vertical",
          contents: cardData.contacts.filter(c => c.value).map(c => ({
            type: "box", layout: "horizontal",
            contents: [
              { type: "text", text: c.label, color: "#999999", size: "sm", width: "60px" },
              { type: "text", text: c.value, color: "#333333", size: "sm", wrap: true }
            ],
            paddingTop: "sm", paddingBottom: "sm"
          }))
        },
        footer: cardData.buttons.filter(b => b.label && b.url).length > 0 ? {
          type: "box", layout: "vertical",
          contents: cardData.buttons.filter(b => b.label && b.url).map(b => ({
            type: "button", style: "primary",
            action: { type: "uri", label: b.label, uri: b.url }
          }))
        } : null
      };
      
      if (!flex.header) delete flex.header;
      if (!flex.footer) delete flex.footer;
      
      document.getElementById('jsonOutput').value = JSON.stringify(flex, null, 2);
    }
    
    // ========== 功能 ==========
    function copyJson() {
      const json = document.getElementById('jsonOutput').value;
      navigator.clipboard.writeText(json).then(function() {
        alert('✅ 已複製到剪貼簿！');
      }, function() {
        alert('複製失敗');
      });
    }
    
    async function shareToLine() {
      if (!currentUserId) {
        alert('請先登入 LINE');
        return;
      }
      
      if (!liff.isInClient()) {
        alert('請在 LINE 內開啟此頁面才能使用分享功能');
        return;
      }
      
      try {
        // 先儲存
        const json = document.getElementById('jsonOutput').value;
        await fetch('/api/cards/save-flex', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ lineId: currentUserId, flexJson: json })
        });
        
        // 發送
        const flexJson = JSON.parse(document.getElementById('jsonOutput').value);
        const flexMessage = {
          type: 'flex',
          altText: '我的名片',
          contents: flexJson
        };
        
        const success = await liff.shareTargetPicker([flexMessage]);
        
        if (success) {
          alert('✅ 已發送給選擇的好友！');
        } else {
          alert('用戶取消了分享');
        }
      } catch (error) {
        console.error(error);
        alert('分享失敗: ' + error.message);
      }
    }
    
    async function loadSavedCard() {
      if (!currentUserId) return;
      
      try {
        const res = await fetch('/api/cards?lineId=' + currentUserId);
        const cards = await res.json();
        
        if (cards.length > 0 && cards[0].flexJson) {
          const flex = JSON.parse(cards[0].flexJson);
          
          // 解析到表單
          if (flex.hero && flex.hero.contents) {
            for (const c of flex.hero.contents) {
              if (c.type === 'image' && c.url) document.getElementById('avatarUrl').value = c.url;
              if (c.type === 'box' && c.contents) {
                for (const t of c.contents) {
                  if (t.weight === 'bold') document.getElementById('displayName').value = t.text || '';
                  if (t.color === '#667eea') document.getElementById('title').value = t.text || '';
                }
              }
            }
          }
          if (flex.header && flex.header.contents && flex.header.contents[0]) {
            document.getElementById('motto').value = flex.header.contents[0].text || '';
          }
        }
      } catch (e) {
        console.log('載入失敗:', e);
      }
    }
  </script>
</body>
</html>
